name: Android Debug

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  debug:
    name: Build Debug APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 for Android SDK tools
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        env:
          SKIP_JDK_VERSION_CHECK: "true"
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      - name: Set up JDK 11 for Gradle build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Show repo state
        run: |
          git log -1 --oneline
          echo
          sed -n '1,120p' build.gradle
          echo
          sed -n '1,160p' settings.gradle
          echo
          sed -n '1,260p' app/build.gradle

      - name: Resolve debug compile classpath
        run: ./gradlew :app:dependencies --configuration debugCompileClasspath --no-daemon --stacktrace

      - name: Inspect resolved Shizuku artifacts
        run: |
          echo "Searching Gradle cache for Shizuku..."
          find ~/.gradle -iname "*shizuku*" | sed -n '1,200p'
          echo
          echo "Looking for Shizuku.class inside AAR classes.jar..."
          found=0
          while IFS= read -r f; do
            case "$f" in
              *.jar)
                if unzip -l "$f" 2>/dev/null | grep -q 'rikka/shizuku/Shizuku.class'; then
                  echo "FOUND IN JAR: $f"
                  unzip -l "$f" | grep 'rikka/shizuku/Shizuku.class'
                  found=1
                fi
                ;;
              *.aar)
                tmpdir="$(mktemp -d)"
                if unzip -q "$f" classes.jar -d "$tmpdir" 2>/dev/null; then
                  if unzip -l "$tmpdir/classes.jar" 2>/dev/null | grep -q 'rikka/shizuku/Shizuku.class'; then
                    echo "FOUND IN AAR: $f"
                    unzip -l "$tmpdir/classes.jar" | grep 'rikka/shizuku/Shizuku.class'
                    found=1
                  fi
                fi
                rm -rf "$tmpdir"
                ;;
            esac
          done < <(find ~/.gradle -type f \( -name "*.jar" -o -name "*.aar" \))
          if [ "$found" -eq 0 ]; then
            echo "Shizuku.class not found in resolved artifacts"
            exit 1
          fi

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace --info

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: shizukurunner-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

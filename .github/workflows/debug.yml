name: Android Debug

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  debug:
    name: Build Debug APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 for Android SDK tools
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        env:
          SKIP_JDK_VERSION_CHECK: "true"
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-33" \
            "build-tools;33.0.2"

      - name: Set up JDK 11 for Gradle build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Show repo state
        run: |
          git log -1 --oneline
          echo
          sed -n '1,120p' build.gradle
          echo
          sed -n '1,160p' settings.gradle
          echo
          sed -n '1,320p' app/build.gradle

      - name: Print debug compile classpath files
        run: ./gradlew :app:printDebugCompileClasspathFiles --no-daemon --stacktrace

      - name: Inspect exact Shizuku AAR contents
        run: |
          API_AAR="/home/runner/.gradle/caches/modules-2/files-2.1/dev.rikka.shizuku/api/13.1.5/1f760c56493bdbc01462930e75bb325033b36fe2/api-13.1.5.aar"
          PROVIDER_AAR="/home/runner/.gradle/caches/modules-2/files-2.1/dev.rikka.shizuku/provider/13.1.5/4135b99cae9362fe2f63380230d04a9bcba9be3f/provider-13.1.5.aar"

          echo "API AAR:"
          ls -l "$API_AAR"
          echo
          echo "PROVIDER AAR:"
          ls -l "$PROVIDER_AAR"
          echo
          echo "Top-level API AAR entries:"
          unzip -l "$API_AAR" | sed -n '1,120p'
          echo
          TMPDIR="$(mktemp -d)"
          unzip -q "$API_AAR" classes.jar -d "$TMPDIR"
          echo "Looking for rikka/shizuku classes in API classes.jar:"
          unzip -l "$TMPDIR/classes.jar" | grep 'rikka/shizuku' || true
          echo
          echo "Looking specifically for Shizuku.class:"
          unzip -l "$TMPDIR/classes.jar" | grep 'rikka/shizuku/Shizuku.class'
          rm -rf "$TMPDIR"

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace --info

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: shizukurunner-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

name: Android Debug

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  debug:
    name: Build Debug APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17 for Android SDK tools
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        env:
          SKIP_JDK_VERSION_CHECK: "true"
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-32" \
            "build-tools;32.0.0"

      - name: Set up JDK 11 for Gradle build
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"
          cache: gradle

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Show repo state
        run: |
          echo "COMMIT:"
          git log -1 --oneline
          echo
          echo "ROOT build.gradle"
          sed -n '1,120p' build.gradle
          echo
          echo "settings.gradle"
          sed -n '1,160p' settings.gradle
          echo
          echo "app/build.gradle"
          sed -n '1,220p' app/build.gradle

      - name: Resolve debug compile classpath
        run: ./gradlew :app:dependencies --configuration debugCompileClasspath --no-daemon --stacktrace

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace --info

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: shizukurunner-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
